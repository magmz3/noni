<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🌟 الفواكة والخضروات | للأطفال 🌟</title>
    <!-- خطوط عربية مرحة ومناسبة للأطفال -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;600;700&family=El+Messiri:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fbf5e8 0%, #f9efd1 100%);
            min-height: 100vh;
            font-family: 'Baloo Bhaijaan 2', 'El Messiri', cursive, sans-serif;
            padding: 20px 16px 40px;
            color: #3b2b1f;
        }

        .farm-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .farm-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .farm-header h1 {
            font-size: 3.2rem;
            font-weight: 700;
            color: #5e3e1c;
            text-shadow: 4px 4px 0 #f3d59b;
            letter-spacing: 2px;
            word-break: break-word;
            display: inline-block;
            padding: 10px 35px;
            background: rgba(255, 251, 235, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            box-shadow: 0 10px 0 #bfa27b, 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid #fff3d1;
            margin-bottom: 20px;
        }

        .farm-header p {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2d5e3c;
            background: #e3f0da;
            display: inline-block;
            padding: 12px 28px;
            border-radius: 50px;
            box-shadow: inset 0 2px 5px rgba(90, 60, 30, 0.08), 0 6px 0 #6f9e7c;
            border: 2px solid #fef9e3;
        }

        .farm-header i {
            margin: 0 10px;
            color: #b1622c;
        }

        .animal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 28px 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .animal-card {
            background: #fffef7;
            border-radius: 50px 50px 40px 40px;
            padding: 20px 18px 22px;
            box-shadow: 0 18px 0 #b2916e, 0 10px 20px rgba(0,0,0,0.15);
            border: 3px solid #ffefc0;
            transition: transform 0.15s ease, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }

        .animal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 0 #9c7e5f, 0 15px 25px rgba(0,0,0,0.2);
            background: #fffffc;
        }

        .image-wrapper {
            width: 100%;
            border-radius: 35px;
            overflow: hidden;
            border: 5px solid #e7cfaa;
            box-shadow: inset 0 0 0 2px #fef7e9, 0 8px 0 #7c623e;
            margin-bottom: 16px;
            background: #d9c2a4;
            aspect-ratio: 1/1;
        }

        .animal-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .animal-card:hover .animal-img {
            transform: scale(1.02);
        }

        .animal-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #4a2e15;
            margin: 8px 0 5px;
            line-height: 1.3;
            text-shadow: 2px 2px 0 #f3deae;
            letter-spacing: 1px;
        }

        .sound-btn {
            background: #ffc857;
            border: none;
            border-radius: 60px;
            padding: 12px 22px;
            margin: 10px 0 5px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #3a2a12;
            box-shadow: 0 6px 0 #b47d2e, 0 3px 8px rgba(0,0,0,0.1);
            border: 3px solid #ffe3a3;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.07s;
            font-family: inherit;
            width: fit-content;
            min-width: 140px;
        }

        .sound-btn i {
            font-size: 1.8rem;
            color: #5a3e0b;
        }

        .sound-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #b47d2e, 0 3px 8px rgba(0,0,0,0.1);
        }

        .sound-btn:hover {
            background: #ffda7c;
        }

        .animal-card.playing .sound-btn {
            background: #f7b32b;
            box-shadow: 0 2px 0 #9e691b;
            transform: translateY(4px);
        }

        .farm-footer {
            margin-top: 55px;
            text-align: center;
            font-size: 1.2rem;
            color: #5f4a2e;
            background: rgba(255,245,215,0.7);
            padding: 18px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 2px dashed #b6956a;
        }

        .farm-footer i {
            color: #b34e1a;
            margin: 0 5px;
        }

        .credit-line {
            direction: ltr;
            display: inline-block;
            background: #e9dbc4;
            padding: 5px 15px;
            border-radius: 30px;
            margin-top: 8px;
            font-size: 1rem;
        }

        @media (max-width: 600px) {
            .farm-header h1 {
                font-size: 2.4rem;
                padding: 8px 20px;
            }
            .farm-header p {
                font-size: 1.4rem;
            }
            .animal-name {
                font-size: 1.9rem;
            }
            .sound-btn {
                font-size: 1.3rem;
                padding: 10px 16px;
                min-width: 120px;
            }
        }

        .animal-card:active .animal-img {
            transform: scale(0.98);
        }

        .hint-tap {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-top: 5px;
            color: #6f4e2b;
        }
    </style>
</head>
<body>

<div class="farm-container">
    <header class="farm-header">
        <h1>
            <i class="fas fa-carrot"></i> 
            الفواكة والخضروات 
            <i class="fas fa-carrot"></i>
        </h1>
        <p>
            <i class="fas fa-volume-up"></i>
            اضغط على الصورة أو زر الصوت 
            <i class="fas fa-hand-pointer"></i>
        </p>
    </header>

    <div class="animal-grid" id="animalGrid"></div>

    <footer class="farm-footer">
        <div>
            <i class="fas fa-heart" style="color: #c44f4f;"></i> 
                .... 
            <i class="fas fa-heart" style="color: #c44f4f;"></i>
        </div>
        <div class="credit-line">
            <i class="fas fa-camera"></i> اعرف هالاشياء
            <i class="fas fa-music"></i> أصوات 
        </div>
        <div style="margin-top: 12px; font-size: 1.1rem;">
            🌟 استمتع يا بطل! 🌟
        </div>
    </footer>
</div>

<script>
    (function() {
        "use strict";

        // مكتبة الحيوانات بالصور الواقعية والأصوات (تم تعديل الروابط الصوتية حسب طلبك)
        const animals = [
            
            {
                nameAr: "برتقال",
                imageUrl: "https://www.sharbatlyfruit.com/fruits/media-gallery/Orange%20Blood%20Cara%20Cars_2.JPG?w=400&auto=format&fit=crop",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/or.mp3",
                icon: "🍊"
            },
            {
                nameAr: "توت",
                imageUrl: "https://m.media-amazon.com/images/I/71Bid-mgl9L._AC_UF1000,1000_QL80_.jpg?w=400&auto=format&fit=crop",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/tt.mp3 ",
                icon: "🍇"
            },
            {
                nameAr: "ليمون",
                imageUrl: "https://cdn.salla.sa/gVzwa/feef7d5a-0558-4ffd-b59c-75cba12429f2-500x500-AMDJ0wc0BLJmySXiZ5Yn88gyckE2NSwMepfI4nuB.png",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/le.mp3 ",
                icon: "🍋"
            },
            {
                nameAr: "تفاح",
                imageUrl: "https://cdn.salla.sa/BEabB/YnBxMcdQarYj9BAI1KAE2vXzzi1KkHH7zDfyQYxB.jpg?w=400&auto=format&fit=crop",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/app.mp3",
                icon: "🍎"
            },
            {
                nameAr: "موز",
                imageUrl: "https://images.todoorstep.com/product/454130/Ar.jpg?t=1744675200?w=400&auto=format&fit=crop",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/baan.mp3",
                icon: "🍌"
            },
            {
                nameAr: "تمرة",
                imageUrl: "https://media.zid.store/9e2147cf-003a-4a7e-97cb-02e7fc34782d/06802c4c-1206-4d0c-9dd2-7e00fcf9a58d.jpg?w=400&auto=format&fit=crop",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/tam.mp3",
                icon: " "
            },
            {
                nameAr: "بسكوت",
                imageUrl: "https://i.ytimg.com/vi/G8z_6djVgVk/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLDiH8fZ4Z5g0cnNRxrP-NiT1O7MKQ?w=400&auto=format&fit=crop",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/bes.mp3 ",
                icon: "🍪 "
            }, 
            {
                nameAr: "مكرونة",
                imageUrl: "https://khayratalreef.com/wp-content/uploads/2024/12/%D9%85%D8%B5%D8%B1%D9%8A%D8%A9-%D8%AE%D9%88%D8%A7%D8%AA%D9%85.jpg?w=400&auto=format&fit=crop",
                soundUrl: " https://github.com/magmz3/noni/raw/refs/heads/Sound/sp.mp3",
                icon: "🍝"
            },
                 {
                nameAr: "رز",
                imageUrl: "https://www.justfood.tv/UserFiles/rizwhite27022024.jpg?w=900&auto=format&fit=crop",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/ric.mp3 ",
                icon: "🍚"
            },
            {
                nameAr: "سيكل",
                imageUrl: "https://sa-littlehelper.glopalstore.com/cdn/shop/products/SilentBabyBalancePink1_1024x1024@2x.jpg?v=1654884577?w=400&auto=format&fit=crop",
                soundUrl: "https://github.com/magmz3/noni/raw/refs/heads/Sound/ss.mp3 ",
                icon: "🛵"
            }
        ];

        const gridContainer = document.getElementById('animalGrid');
        if (!gridContainer) return;

        // المتغيرات لإدارة الصوت الحالي ومنع التداخل
        let currentAudio = null;
        let currentCard = null;   // لتتبع البطاقة النشطة

        // إيقاف أي صوت سابق وإزالة التأثيرات
        function stopCurrentAudio() {
            if (currentAudio) {
                try {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                } catch (e) {
                    // تجاهل الأخطاء
                }
                currentAudio = null;
            }
            if (currentCard) {
                currentCard.classList.remove('playing');
                currentCard = null;
            }
        }

        // إزالة كلاس playing من جميع البطاقات (للتأكيد)
        function removePlayingClassFromAll() {
            document.querySelectorAll('.animal-card').forEach(card => {
                card.classList.remove('playing');
            });
        }

        // دالة إنشاء بطاقة حيوان
        function createAnimalCard(animal) {
            const card = document.createElement('div');
            card.className = 'animal-card';
            
            // غلاف الصورة
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';
            
            const img = document.createElement('img');
            img.className = 'animal-img';
            img.src = animal.imageUrl;
            img.alt = `صورة واقعية لـ ${animal.nameAr}`;
            img.loading = 'lazy';
            img.onerror = function() {
                this.src = 'https://images.unsplash.com/photo-1535268647677-300dbf3d78d1?w=400&auto=format&fit=crop';
                this.alt = 'صورة لمزرعة جميلة';
            };
            
            imgWrapper.appendChild(img);
            
            // اسم الحيوان
            const nameEl = document.createElement('div');
            nameEl.className = 'animal-name';
            nameEl.innerHTML = `${animal.icon || ''} ${animal.nameAr}`;
            
            // زر الصوت
            const soundBtn = document.createElement('button');
            soundBtn.className = 'sound-btn';
            soundBtn.innerHTML = `<i class="fas fa-play"></i> <i class="fas fa-volume-up"></i> استمع`;
            soundBtn.setAttribute('aria-label', `تشغيل صوت ${animal.nameAr}`);
            
            // ----------------------------------------------
            // دالة تشغيل الصوت (محسّنة لمنع التداخل والتكرار)
            // ----------------------------------------------
            const playSound = (e) => {
                // منع انتشار الحدث لتجنب استدعاء المستمعات المتعددة
                if (e) {
                    e.stopPropagation();
                }

                // 1. إيقاف أي صوت سابق تماماً
                stopCurrentAudio();
                removePlayingClassFromAll();

                // 2. إنشاء كائن صوتي جديد
                const audio = new Audio(animal.soundUrl);
                
                // 3. ضبط المتغيرات العامة
                currentAudio = audio;
                currentCard = card;
                
                // 4. إظهار التأثير على البطاقة الحالية
                card.classList.add('playing');

                // 5. معالجة نهاية الصوت أو خطأه
                audio.addEventListener('ended', () => {
                    card.classList.remove('playing');
                    if (currentAudio === audio) {
                        currentAudio = null;
                        currentCard = null;
                    }
                });
                
                audio.addEventListener('error', () => {
                    card.classList.remove('playing');
                    currentAudio = null;
                    currentCard = null;
                    console.warn("تعذر تحميل الصوت، تحقق من الرابط");
                });

                // 6. تشغيل الصوت مع معالجة الوعد (لأمان المتصفح)
                audio.play().catch(err => {
                    console.warn("التشغيل تطلب تفاعل إضافي:", err);
                    card.classList.remove('playing');
                    currentAudio = null;
                    currentCard = null;
                });
            };
            
            // ----------------------------------------------
            // ربط الأحداث بشكل يمنع التشغيل المزدوج
            // ----------------------------------------------
            
            // عند النقر على الصورة
            img.addEventListener('click', (e) => {
                e.stopPropagation();  // مهم لمنع تشغيل مستمع البطاقة
                playSound(e);
            });
            
            // عند النقر على الزر
            soundBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                playSound(e);
            });
            
            // عند النقر على أي مكان آخر في البطاقة (باستثناء الصورة والزر)
            card.addEventListener('click', (e) => {
                // إذا كان الهدف هو الزر أو الصورة، لن نكرر لأن stopPropagation منع الوصول
                // لكن للتأكد (إذا كان هناك أي تسرب) نتحقق:
                const target = e.target;
                if (!target.closest('.sound-btn') && !target.closest('.animal-img')) {
                    playSound(e);
                }
            });
            
            // تجميع البطاقة
            card.appendChild(imgWrapper);
            card.appendChild(nameEl);
            card.appendChild(soundBtn);
            
            const hint = document.createElement('div');
            hint.className = 'hint-tap';
            hint.innerHTML = '<i class="fas fa-fingerprint"></i> المس الصورة';
            card.appendChild(hint);
            
            return card;
        }

        // بناء الشبكة
        animals.forEach(animal => {
            const card = createAnimalCard(animal);
            gridContainer.appendChild(card);
        });

        console.log("✅ تم الإصلاح: صوت واحد فقط في كل مرة، ولا تكرار عند الضغط!");
    })();
</script>

</body>
</html>
